{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-4rem)] px-4 py-12">
    <div class="max-w-md w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black text-violet-600 dark:text-indigo-400 tracking-tight">ANIVERSE</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">서브컬처 창작자들의 은하수에 오신 것을 환영합니다.</p>
        </div>

        {% if form.errors %}
        <div class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-sm text-red-600 dark:text-red-400">
            아이디 또는 비밀번호를 다시 확인해 주세요.
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-600 dark:text-gray-400">{{ field.label }}</label>
                <div class="relative">{{ field }}</div>
            </div>
            {% endfor %}

            <button type="submit" class="w-full py-3 px-4 bg-violet-600 hover:bg-violet-700 text-white font-medium rounded-xl shadow-sm shadow-violet-600/10 transition mt-2">
                로그인
            </button>
        </form>

        <div class="border-t border-gray-100 dark:border-gray-700 pt-4 text-center text-sm text-gray-500 dark:text-gray-400">
            아직 계정이 없으신가요? 
            <a href="{% url 'accounts:signup' %}" class="text-violet-600 dark:text-indigo-400 font-semibold hover:underline pl-1">회원가입</a>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('input').forEach(input => {
        input.className = "w-full px-4 py-3 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 dark:focus:ring-indigo-400 transition text-sm";
    });
</script>
{% endblock %}
