{% extends 'base.html' %}
{% block content %}

<!-- SweetAlert2 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- TinyMCE CDN 로드 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>

<div class="max-w-4xl mx-auto px-4 py-10">
    <div class="mb-8 border-b border-gray-200 dark:border-gray-700 pb-6">
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">
            {% if form.instance.pk %}커뮤니티 글 수정{% else %}커뮤니티 글쓰기{% endif %}
        </h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2">
            {% if form.instance.pk %}작성하신 내용을 수정합니다.{% else %}당신의 의견이나 질문을 자유롭게 공유해 주세요.{% endif %}
        </p>
    </div>
    
    <!-- 💡 브라우저 기본 유효성 검사를 완전히 차단하기 위해 novalidate 추가 -->
    <form method="post" enctype="multipart/form-data" class="space-y-6" id="post-form" novalidate>
        {% csrf_token %}
        
        <!-- 1. 카테고리 / 제목 섹션 -->
        <div class="p-5 border border-gray-100 dark:border-gray-700 rounded-2xl bg-white dark:bg-gray-800 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-end gap-4">
                
                <!-- 카테고리 선택 드롭다운 -->
                <div class="w-full md:w-1/4 flex-shrink-0">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">카테고리</label>
                    <select name="board_type" id="id_board_type"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-200 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block dark:bg-gray-700 transition cursor-pointer">
                        <option value="" disabled {% if not form.instance.board_type %}selected{% endif %}>카테고리를 선택하세요</option>
                        {% if user.is_staff %}
                        <option value="notice" {% if form.instance.board_type == 'notice' %}selected{% endif %}>공지 사항</option>
                        {% endif %}
                        <option value="qna" {% if form.instance.board_type == 'qna' %}selected{% endif %}>질문 답변</option>
                        <option value="free" {% if form.instance.board_type == 'free' %}selected{% endif %}>자유 게시판</option>
                        <option value="info" {% if form.instance.board_type == 'info' %}selected{% endif %}>정보 공유</option>
                    </select>
                </div>

                <!-- 제목 입력창 -->
                <div class="flex-grow">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">질문 / 제목</label>
                    <input type="text" name="title" id="id_title" value="{{ form.instance.title|default:'' }}" placeholder="제목을 입력하세요"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-200 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block dark:bg-gray-700 transition">
                </div>
                
                <!-- 파일 첨부 -->
                <div class="flex-shrink-0 w-full md:w-auto relative">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">이미지 첨부</label>
                    
                    <div class="flex items-center gap-2">
                        {% if form.instance.image %}
                        <div id="existing-image-box" class="relative flex-shrink-0 border border-gray-200 dark:border-gray-700 rounded-lg bg-gray-50 p-0.5 dark:bg-gray-900 mr-2">
                            <img src="{{ form.instance.image.url }}" alt="기존 이미지" class="w-10 h-10 object-contain rounded-md">
                            
                            <button type="button" onclick="clearExistingImage()"
                                class="absolute -top-2 -right-2 bg-red-500 hover:bg-red-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-[11px] font-extrabold shadow-md transition z-10">
                                ✕
                            </button>
                        </div>
                        <input type="hidden" name="clear_image" id="clear-image-trigger" value="false">
                        {% endif %}

                        <input type="file" name="image" id="id_image" onchange="handleFileChange(this)"
                            class="block w-full text-sm text-gray-500 dark:text-gray-400
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-full file:border-0
                            file:text-xs file:font-bold
                            file:bg-purple-50 file:text-purple-700
                            dark:file:bg-purple-900/30 dark:file:text-purple-300
                            hover:file:bg-purple-100 dark:hover:file:bg-purple-900/50
                            cursor-pointer border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700">
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 내용 섹션 (순수 textarea + TinyMCE 조합) -->
        <div class="p-5 border border-gray-100 dark:border-gray-700 rounded-2xl bg-white dark:bg-gray-800 shadow-sm">
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">내용</label>
            <div>
                <textarea name="content" id="id_content" rows="10"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-200 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block dark:bg-gray-700 transition">{{ form.instance.content|default:'' }}</textarea>
            </div>
        </div>

        <!-- 3. 하단 취소 / 등록 버튼 영역 -->
        <div class="flex justify-end gap-3 pt-4 pb-12">
            <a href="javascript:history.back();" class="px-8 py-3.5 bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-xl font-bold hover:bg-gray-200 dark:hover:bg-gray-600 transition text-sm">
                취소
            </a>
            <button type="submit" class="px-10 py-3.5 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition-colors shadow-md hover:shadow-lg transform hover:-translate-y-0.5 dark:text-white block">
                {% if form.instance.pk %}수정 완료{% else %}등록하기{% endif %}
            </button>
        </div>
    </form>
</div>

<!-- 자바스크립트 수동 제어 -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    if (document.getElementById("id_content")) {
        tinymce.init({
            selector: '#id_content',
            height: 400,
            menubar: false,
            plugins: 'lists link image table code help wordcount',
            toolbar: 'undo redo | blocks | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | removeformat | help',
            skin: (window.matchMedia("(prefers-color-scheme: dark)").matches ? "oxide-dark" : "oxide"),
            content_css: (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "default")
        });
    }
});

// 💡 폼 제출 시 브라우저 기본 검사를 무시하고 자바스크립트로 완벽하게 검증 후 전송
document.getElementById('post-form').addEventListener('submit', function(e) {
    e.preventDefault(); // 기본 제출 막기

    // 1. TinyMCE 내용을 textarea에 동기화
    if (typeof tinymce !== 'undefined') {
        tinymce.triggerSave();
    }

    const boardType = document.getElementById('id_board_type').value;
    const title = document.getElementById('id_title').value.trim();
    const content = document.getElementById('id_content').value.trim();

    // 2. 입력값 검증
    if (!boardType) {
        Swal.fire('알림', '카테고리를 선택해주세요.', 'warning');
        return;
    }
    if (!title) {
        Swal.fire('알림', '제목을 입력해주세요.', 'warning');
        return;
    }
    if (!content) {
        Swal.fire('알림', '내용을 입력해주세요.', 'warning');
        return;
    }

    // 3. 모든 검증 통과 시 강제 제출
    this.submit();
});

function clearExistingImage() {
    Swal.fire({
        title: '기존 첨부 이미지를 삭제하시겠습니까?',
        text: "글 저장 시 최종 반영됩니다.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#a1a1aa',
        confirmButtonText: '확인',
        cancelButtonText: '취소',
        reverseButtons: true,
        customClass: {
            title: 'swal-custom-title',
            icon: 'swal-custom-icon'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            const imageBox = document.getElementById('existing-image-box');
            if (imageBox) imageBox.classList.add('hidden');
            
            const trigger = document.getElementById('clear-image-trigger');
            if (trigger) trigger.value = 'true';
        }
    });
}

function handleFileChange(input) {
    if (input.files && input.files[0]) {
        const imageBox = document.getElementById('existing-image-box');
        if (imageBox) imageBox.classList.add('hidden');
        
        const trigger = document.getElementById('clear-image-trigger');
        if (trigger) trigger.value = 'true';
    }
}
</script>

<style>
    .swal-custom-title {
        font-size: 1.4rem !important;
        font-weight: 700 !important;
        padding-top: 10px !important;
    }
    .swal-custom-icon {
        width: 4rem !important;
        height: 4rem !important;
        min-width: 4rem !important;
        margin-top: 20px !important;
    }
    .swal2-icon.swal2-warning .swal2-icon-content {
        font-size: 2.5rem !important;
    }
</style>

{% endblock %}
