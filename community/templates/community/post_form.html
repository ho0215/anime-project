{% extends 'base.html' %}
{% block content %}

<!-- 장고 CKEditor 렌더링에 필요한 자바스크립트 소스 파일 로드 -->
{{ form.media }}

<div class="max-w-4xl mx-auto px-4 py-10">
    <div class="mb-8 border-b border-gray-200 dark:border-gray-700 pb-6">
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">커뮤니티 글쓰기</h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2">당신의 의견이나 질문을 자유롭게 공유해 주세요.</p>
    </div>
    
    <form method="post" enctype="multipart/form-data" class="space-y-6" id="post-form">
        {% csrf_token %}
        
        <!-- 1. 카테고리 / 질문 / 제목 섹션 -->
        <div class="p-5 border border-gray-100 dark:border-gray-700 rounded-2xl bg-white dark:bg-gray-800 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-end gap-4">
                
                <!-- 카테고리 선택 드롭다운 -->
                <div class="w-full md:w-1/4 flex-shrink-0">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">카테고리</label>
                    <select name="board_type" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-200 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block dark:bg-gray-700 transition cursor-pointer">
                        <option value="" selected disabled>카테고리를 선택하세요</option>
                        {% if user.is_staff %}
                        <option value="notice">공지 사항</option>
                        {% endif %}
                        <option value="qna">질문 답변</option>
                        <option value="free">자유 게시판</option>
                        <option value="info">정보 공유</option>
                    </select>
                </div>

                <!-- 제목 입력창 -->
                <div class="flex-grow">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">질문 / 제목</label>
                    <input type="text" name="title" placeholder="제목을 입력하세요" 
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-gray-200 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block dark:bg-gray-700 transition">
                </div>
                
                <!-- 파일 첨부 -->
                <div class="flex-shrink-0 w-full md:w-auto">
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">이미지 첨부</label>
                    <input type="file" name="image" 
                        class="block w-full text-sm text-gray-500 dark:text-gray-400
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-full file:border-0
                        file:text-xs file:font-bold
                        file:bg-purple-50 file:text-purple-700
                        dark:file:bg-purple-900/30 dark:file:text-purple-300
                        hover:file:bg-purple-100 dark:hover:file:bg-purple-900/50
                        cursor-pointer border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700">
                </div>
            </div>
        </div>

        <!-- 2. 내용 섹션 (CKEditor 렌더링 영역) -->
        <div class="p-5 border border-gray-100 dark:border-gray-700 rounded-2xl bg-white dark:bg-gray-800 shadow-sm">
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">내용</label>
            
            <!-- django-ckeditor widget 폼 출력 -->
            <div class="django-ckeditor-wrapper">
                {{ form.content }}
            </div>
        </div>

        <!-- 3. 하단 등록 버튼 영역 -->
        <div class="flex justify-end pt-4 pb-12">
            <button type="submit" class="px-10 py-3.5 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition-colors shadow-md hover:shadow-lg transform hover:-translate-y-0.5 dark:text-white block">
                등록하기
            </button>
        </div>
    </form>
</div>

<!-- 테일윈드 다크모드 등 기본 에디터 스타일을 잡아주기 위한 소소한 CSS 튜닝 -->
<style>
    .django-ckeditor-wrapper .django-ckeditor-widget {
        width: 100% !important;
    }
    .cke_chrome {
        border-radius: 0.75rem !important;
        border: 1px solid #d1d5db !important;
        overflow: hidden;
    }
    .dark .cke_chrome {
        border-color: #4b5563 !important;
    }
</style>

{% endblock %}
