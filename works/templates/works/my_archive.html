{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">내 게시글 보관함</h2>
    {% if archived %}
        <div class="space-y-3">
            {% for work in archived %}
                <div class="flex items-center justify-between bg-white border border-gray-200 rounded-xl px-5 py-3">
                    <a href="{% url 'works:work_detail' work.pk %}" class="text-sm text-gray-800 hover:underline">{{ work.title }}</a>
                    <form method="POST" action="{% url 'works:work_toggle_visibility' work.pk %}">
                        {% csrf_token %}
                        <button type="submit" class="text-xs border border-gray-300 px-3 py-1.5 rounded-full hover:bg-gray-50">공개로 전환</button>
                    </form>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-sm text-gray-400 text-center py-10">보관된 글이 없어요.</p>
    {% endif %}
</div>
{% endblock %}
