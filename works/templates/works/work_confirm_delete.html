{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16 text-center">
    <h1 class="text-2xl font-bold text-gray-900 mb-3">정말 삭제하시겠습니까?</h1>
    <p class="text-gray-500 mb-8">"<strong>{{ work.title }}</strong>" 글이 영구적으로 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</p>

    <form method="POST" class="flex justify-center gap-3">
        {% csrf_token %}
        <a href="{% url 'works:work_detail' work.pk %}"
           class="px-6 py-2.5 rounded-full border border-gray-300 text-sm font-semibold text-gray-700 hover:bg-gray-100 transition">
            취소
        </a>
        <button type="submit"
                class="px-6 py-2.5 rounded-full bg-red-600 text-white text-sm font-semibold hover:bg-red-700 transition">
            삭제하기
        </button>
    </form>
</div>
{% endblock %}
