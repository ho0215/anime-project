{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">

    <!-- 마이페이지 서브 내비게이션 -->
    <div class="flex gap-2 bg-gray-100 p-1 rounded-xl w-fit mb-6">
        <a href="{% url 'works:my_drafts' %}" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-white text-gray-900 shadow-sm">임시저장</a>
        <a href="{% url 'works:my_archive' %}" class="px-3 py-1.5 rounded-lg text-xs font-medium text-gray-500 hover:text-gray-900">보관함</a>
        <a href="{% url 'works:my_interests' %}" class="px-3 py-1.5 rounded-lg text-xs font-medium text-gray-500 hover:text-gray-900">관심목록</a>
    </div>

    <h2 class="text-2xl font-bold text-gray-900 mb-6">임시저장 목록</h2>
    {% if drafts %}
        <div class="space-y-3">
            {% for work in drafts %}
                <div class="flex items-center justify-between bg-white border border-gray-200 rounded-xl px-5 py-3 hover:border-gray-400 transition cursor-pointer"
                     onclick="location.href='{% url 'works:work_update' work.pk %}'">
                    <span class="text-sm text-gray-800">🔒 {{ work.title|default:"제목 없음" }}</span>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">{{ work.updated_at|date:"Y.m.d" }}</span>
                        <a href="{% url 'works:work_delete' work.pk %}"
                           onclick="event.stopPropagation()"
                           class="text-xs text-gray-400 hover:text-red-500">삭제</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="text-sm text-gray-400 text-center py-10">임시저장된 글이 없어요.</p>
    {% endif %}
</div>
{% endblock %}
