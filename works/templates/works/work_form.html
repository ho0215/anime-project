{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white border border-gray-200 p-8 rounded-2xl shadow-sm">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">새로운 창작물 투고</h2>
        <p class="text-gray-500 text-sm mb-6">자신의 코스프레 사진, 일러스트, 혹은 멋진 소설을 동료들과 공유하세요.</p>
        
        <!-- 이미지 전용 파일 인코딩(enctype) 필수 입력 형태 -->
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <!-- 원작 작품 명 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">원작 작품명</label>
                <input type="text" name="target_program" required placeholder="예: 최애의 아이, 블루 아카이브"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- 분야 선택 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">분야 카테고리</label>
                <select name="category" required 
                        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="cosplay">📸 코스프레</option>
                    <option value="illustration">🎨 일러스트</option>
                    <option value="novel">✍️ 소설</option>
                </select>
            </div>

            <!-- 제목 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">창작물 제목</label>
                <input type="text" name="title" required placeholder="작품의 제목을 입력하세요."
                       class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- 파일 업로드 (코스프레/일러스트는 필수 권장, 소설은 생략 가능) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">이미지 파일 첨부</label>
                <input type="file" name="image" accept="image/*"
                       class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                <p class="text-xs text-gray-400 mt-1">※ 코스프레 및 일러스트 분야는 가급적 이미지를 첨부해 주세요.</p>
            </div>

            <!-- 내용 입력 -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">내용 및 소설 본문</label>
                <textarea name="content" rows="10" required placeholder="소설 본문이나 창작물에 대한 소개글을 자유롭게 작성하세요."
                          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-sans"></textarea>
            </div>

            <!-- 하단 버튼 -->
            <div class="flex justify-end gap-3 pt-4 border-t">
                <a href="{% url 'works:work_list' %}" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">취소</a>
                <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow-sm transition">등록하기</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
