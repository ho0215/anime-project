{% extends 'base.html' %}

{% block content %}
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
    <section>
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white">실시간 인기 창작물</h2>
            </div>
        </div>

        <div class="columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm break-inside-avoid hover:shadow-md transition">
                <div class="h-48 bg-gray-200 dark:bg-gray-700 w-full object-cover"></div>
                <div class="p-4">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-50 dark:bg-violet-900/30 text-violet-600 dark:text-indigo-400 mb-2">#발로란트</span>
                    <h3 class="font-bold text-gray-900 dark:text-white">제트 팬아트</h3>
                </div>
            </div>
            
            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm break-inside-avoid hover:shadow-md transition">
                <div class="h-64 bg-gray-200 dark:bg-gray-700 w-full object-cover"></div>
                <div class="p-4">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-50 dark:bg-violet-900/30 text-violet-600 dark:text-indigo-400 mb-2">#로스트아크</span>
                    <h3 class="font-bold text-gray-900 dark:text-white">도화가 코스프레</h3>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl overflow-hidden border border-gray-100 dark:border-gray-700 shadow-sm break-inside-avoid hover:shadow-md transition">
                <div class="h-56 bg-gray-200 dark:bg-gray-700 w-full object-cover"></div>
                <div class="p-4">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-violet-50 dark:bg-violet-900/30 text-violet-600 dark:text-indigo-400 mb-2">#마인크래프트</span>
                    <h3 class="font-bold text-gray-900 dark:text-white">도트 그래픽 아웃풋</h3>
                </div>
            </div>
        </div>
    </section>
</main>
{% endblock %}
