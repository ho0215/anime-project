{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIVERSE</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 font-sans antialiased transition-colors duration-300">

    <nav class="bg-white dark:bg-gray-900/95 backdrop-blur-sm border-b border-gray-100 dark:border-gray-800 sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-6">
                    <a href="/" class="text-2xl font-black text-violet-600 dark:text-indigo-400 tracking-tight">ANIVERSE</a>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="hover:text-violet-600 dark:hover:text-white font-medium transition {% if request.path == '/' %}text-violet-600 dark:text-indigo-400 font-bold{% else %}text-gray-600 dark:text-gray-400{% endif %}">
                            일러스트
                        </a>
                        
                        <a href="{% url 'anime:anime_list' %}" class="hover:text-violet-600 dark:hover:text-white font-medium transition {% if '/anime/' in request.path %}text-violet-600 dark:text-indigo-400 font-bold{% else %}text-gray-600 dark:text-gray-400{% endif %}">
                            애니메이션
                        </a>
                        
                        <a href="{% url 'deal:deal_board' %}" class="hover:text-violet-600 dark:hover:text-white font-medium transition {% if '/deal/' in request.path %}text-violet-600 dark:text-indigo-400 font-bold{% else %}text-gray-600 dark:text-gray-400{% endif %}">
                            거래 / 장터
                        </a>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-gray-800 rounded-full text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-700 transition">
                        <span id="theme-icon">🌙</span>
                    </button>

                    {% if user.is_authenticated %}
                        <span class="text-sm font-bold text-violet-600 dark:text-indigo-400">{{ user.username }}님</span>

                        <a href="{% url 'deal:deal_chat_list' %}" class="text-xs font-semibold text-violet-600 dark:text-indigo-400 hover:underline transition">거래 채팅</a>
                        <a href="{% url 'accounts:profile' %}" class="text-xs font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition">마이페이지</a>
                        <form method="POST" action="{% url 'accounts:logout' %}" class="inline m-0 p-0">
                            {% csrf_token %}
                            <button type="submit" class="text-xs font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition bg-transparent border-none cursor-pointer focus:outline-none">로그아웃</button>
                        </form>
                        <button class="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white text-sm font-medium rounded-xl shadow-sm transition">작품 올리기</button>
                    {% else %}
                        <a href="{% url 'accounts:login' %}" class="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-violet-600 dark:hover:text-white transition">로그인</a>
                        <a href="{% url 'accounts:signup' %}" class="px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-200 text-sm font-medium rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition">회원가입</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            themeIcon.textContent = '☀️';
        } else {
            htmlElement.classList.remove('dark');
            themeIcon.textContent = '🌙';
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
